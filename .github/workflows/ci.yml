name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Type Check (packages)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter="./packages/*"

      - name: Type check packages
        run: pnpm turbo run check-types --filter="./packages/*"

  build-apps:
    name: Build Apps & Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apps:
              - 'apps/**'
              - 'templates/**'

      - name: Setup pnpm
        if: steps.filter.outputs.apps == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.filter.outputs.apps == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.filter.outputs.apps == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build apps and templates
        if: steps.filter.outputs.apps == 'true'
        run: pnpm turbo run build --filter="./apps/*" --filter="./templates/*"

      - name: Type check apps and templates
        if: steps.filter.outputs.apps == 'true'
        run: pnpm turbo run check-types --filter="./apps/*" --filter="./templates/*"
